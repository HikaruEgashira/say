name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun build index.ts --outfile=say.js

      - name: Create wrapper script
        run: |
          cat > say << 'EOF'
          #!/bin/sh
          exec bun "$(dirname "$0")/say.js" "$@"
          EOF
          chmod +x say

      - name: Archive for each platform
        run: |
          for suffix in darwin-arm64 darwin-x64 linux-x64; do
            tar czf say-${{ github.ref_name }}-${suffix}.tar.gz say say.js
          done

      - uses: actions/upload-artifact@v4
        with:
          name: say-bundles
          path: say-${{ github.ref_name }}-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
