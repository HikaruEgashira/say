name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            suffix: darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            suffix: darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun build --compile --target=${{ matrix.target }} --outfile=say index.ts

      - name: Archive
        run: tar czf say-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz say

      - uses: actions/upload-artifact@v4
        with:
          name: say-${{ matrix.suffix }}
          path: say-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
